<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najda Admin - Iframe Version</title>
    <style>
        :root { --neon: #00f2fe; --bg: #0a0a12; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #333; background: #000; color: var(--neon); font-size: 1.5rem; text-align: center; margin: 20px 0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, #4facfe, #00f2fe); color: black; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        /* المربع اللي هيظهر فيه الرد */
        #resultFrame { width: 100%; height: 250px; border: 2px dashed var(--neon); border-radius: 15px; margin-top: 20px; display: none; background: white; }
        .reset-btn { margin-top: 10px; color: #ff4b2b; cursor: pointer; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>لوحة تحكم نجدة ⚡</h2>
        <input type="text" id="promoInput" placeholder="NAG-5036">
        <button onclick="checkCode()">تفعيل الكود</button>
        
        <iframe id="resultFrame" name="resFrame"></iframe>
        <div id="resetBtn" class="reset-btn" onclick="location.reload()">تنظيف الشاشة لأوردر جديد</div>
    </div>

    <script>
        function checkCode() {
            const code = document.getElementById('promoInput').value.trim().toUpperCase();
            if(!code) return alert("اكتب الكود!");

            const frame = document.getElementById('resultFrame');
            const reset = document.getElementById('resetBtn');
            
            // بنخلي الـ Iframe يفتح رابط الكود
            frame.src = `https://najda-order-hegazy.lovable.app/promocode/${code}`;
            frame.style.display = "block";
            reset.style.display = "block";
        }
    </script>
</body>
</html>
