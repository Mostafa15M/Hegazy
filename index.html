<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Najda Admin Neon</title>
    <style>
        :root {
            --bg-color: #050509;
            --container-bg: rgba(20, 20, 35, 0.6);
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 10%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 242, 254, 0.15) 0px, transparent 50%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255,255,255,0.03);
            text-align: center;
            width: 85%;
            max-width: 380px;
            transform: translateY(0);
            animation: fadeIn 0.6s ease-out;
        }

        h2 {
            margin-top: 0;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #a2a2a2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-color);
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            background: rgba(0, 0, 0, 0.4);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0;
            font-size: 1rem;
            font-weight: normal;
        }

        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--secondary-neon), var(--primary-neon));
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        button:hover {
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(0, 242, 254, 0.3);
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        button:hover::after {
            left: 100%;
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لضمان مظهر التطبيق على الموبايل */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>نجدة - أدمن ⚡</h2>
        <div class="subtitle">نظام تفعيل البرومو كود</div>
        
        <div class="input-group">
            <input type="text" id="promoInput" placeholder="NAG-XXXX" autocomplete="off" autocapitalize="characters">
        </div>

        <button onclick="startVerification()">تفعيل الآن</button>
    </div>

    <script>
        // تحويل الحروف لكابيتال تلقائياً في المربع
        document.getElementById('promoInput').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });

        function startVerification() {
            const btn = document.querySelector('button');
            const code = document.getElementById('promoInput').value.trim();
            
            if (code === "") {
                alert("اكتب الكود الأول يا بطل! 😉");
                return;
            }

            // تأثير بسيط عند الضغط
            btn.innerHTML = 'جاري التحويل...';
            btn.style.opacity = '0.7';

            // ده الرابط اللي هيفتح صفحة التأكيد في موقعك
            const url = `https://najda-order-hegazy.lovable.app/promocode/${code}`;
            
            // تأخير بسيط عشان تشوف التأثير وبعدين يحولك
            setTimeout(() => {
                window.location.href = url;
                
                // إعادة الزرار لأصله لو رجع للصفحة
                setTimeout(() => {
                    btn.innerHTML = 'تفعيل الآن';
                    btn.style.opacity = '1';
                }, 1000);
            }, 500);
        }
    </script>

</body>
</html>
