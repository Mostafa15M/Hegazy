<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Najda Cyber Admin</title>
    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-pink: #ff00ff;
            --dark-deep: #020205;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: linear-gradient(-45deg, #020205, #0a0a1f, #050d1a, #020205);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        h2 {
            margin: 0; color: #fff; font-size: 1.5rem;
            text-transform: uppercase; letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
        }

        .input-area {
            padding: 30px 20px;
            display: flex; flex-direction: column; gap: 20px;
        }

        input {
            width: 100%; padding: 20px;
            border-radius: 15px; border: 2px solid var(--neon-cyan);
            background: rgba(0, 0, 0, 0.8);
            color: var(--neon-cyan); font-size: 1.8rem; font-weight: 900;
            text-align: center; box-sizing: border-box; outline: none;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 25px var(--neon-cyan);
            border-color: #fff;
        }

        button {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
            color: #fff; font-weight: 900; font-size: 1.3rem;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); box-shadow: 0 0 5px var(--neon-pink); }

        .result-container {
            flex-grow: 1; margin: 15px; border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden; display: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 254, 0.2);
            position: absolute; top: 0; left: 0;
            animation: scan 3s linear infinite; pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div class="scanline"></div>

    <div class="app-header">
        <h2>NAJDA SYSTEM v2.0</h2>
    </div>

    <div class="input-area">
        <input type="text" id="promoInput" placeholder="ENTER CODE" autocomplete="off">
        <button onclick="activatePromo()">تفعيل الكود السري ⚡</button>
    </div>

    <div id="resBox" class="result-container">
        <iframe id="targetFrame" name="targetFrame"></iframe>
    </div>

    <script>
        const clickSound = document.getElementById('clickSound');
        const successSound = document.getElementById('successSound');

        function activatePromo() {
            const code = document.getElementById('promoInput').value.trim().toUpperCase();
            
            // تشغيل صوت الكليك
            clickSound.play();

            if (!code) {
                alert("يا بطل فين الكود؟");
                return;
            }

            // تشغيل صوت النجاح/البدء
            setTimeout(() => { successSound.play(); }, 200);

            const resBox = document.getElementById('resBox');
            const frame = document.getElementById('targetFrame');

            resBox.style.display = "block";
            frame.src = `https://najda-order-hegazy.lovable.app/promocode/${code}`;
        }

        // تحويل الحروف لكابيتال تلقائياً وصوت خفيف عند الكتابة
        document.getElementById('promoInput').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });
    </script>
</body>
</html>
