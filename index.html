<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Najda APK Admin</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --dark-bg: #050508;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* عشان ميبقاش فيه سكرول بره الحاويات */
            display: flex;
            flex-direction: column;
        }

        /* رأس التطبيق */
        .app-header {
            background: rgba(20, 20, 30, 0.9);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 {
            margin: 0;
            color: white;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* منطقة الإدخال */
        .input-area {
            padding: 20px;
            background: #0a0a15;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #222;
            background: #000;
            color: var(--neon-blue);
            font-size: 1.4rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--neon-blue); }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        /* منطقة عرض النتيجة (المربع السحري) */
        .result-container {
            flex-grow: 1; /* ياخد باقي مساحة الشاشة */
            position: relative;
            background: #fff;
            margin: 10px;
            border-radius: 15px;
            overflow: hidden;
            display: none; /* مخفي لحد ما نكتب الكود */
            border: 3px solid var(--neon-blue);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--neon-blue);
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h2>NAJDA - نظام التفعيل ⚡</h2>
    </div>

    <div class="input-area">
        <input type="text" id="promoInput" placeholder="NAG-XXXX" autocomplete="off">
        <button onclick="activatePromo()">تأكيد و عرض النتيجة</button>
    </div>

    <div id="resBox" class="result-container">
        <div id="loader" class="loader">جاري تحميل النتيجة...</div>
        <iframe id="targetFrame" name="targetFrame"></iframe>
    </div>

    <script>
        function activatePromo() {
            const code = document.getElementById('promoInput').value.trim().toUpperCase();
            if (!code) {
                alert("اكتب الكود أولاً!");
                return;
            }

            const resBox = document.getElementById('resBox');
            const frame = document.getElementById('targetFrame');
            const loader = document.getElementById('loader');

            // إظهار منطقة النتيجة والتحميل
            resBox.style.display = "block";
            loader.style.display = "block";
            
            // توجيه الرابط للـ iframe
            frame.src = `https://najda-order-hegazy.lovable.app/promocode/${code}`;

            frame.onload = function() {
                loader.style.display = "none";
            };
        }

        // تحويل الحروف لكابيتال تلقائياً
        document.getElementById('promoInput').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });
    </script>
</body>
</html>
